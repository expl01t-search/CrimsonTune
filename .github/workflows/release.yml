name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate application icon
        run: python tools/gen_icon.py

      - name: Build executable
        run: pyinstaller build.spec

      - name: Create release archive
        shell: pwsh
        run: |
          Compress-Archive -Path dist/CrimsonTune.exe -DestinationPath CrimsonTune-${{ github.ref_name }}-win64.zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/CrimsonTune.exe
            CrimsonTune-${{ github.ref_name }}-win64.zip
