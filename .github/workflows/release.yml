name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Verify imports
        run: python -c "from core.brand import APP_VERSION; print('CrimsonTune', APP_VERSION)"

      - name: Resolve version from tag
        id: ver
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v','V')
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "Version: $version"

      - name: Extract release notes from CHANGELOG
        run: python tools/extract_release_notes.py ${{ steps.ver.outputs.version }} RELEASE_NOTES.md

      - name: Generate application icon
        run: python tools/gen_icon.py

      - name: Generate version metadata
        run: python tools/gen_version_info.py

      - name: Build executable
        run: pyinstaller build.spec

      - name: Create release archive
        shell: pwsh
        run: |
          Compress-Archive -Path dist/CrimsonTune.exe -DestinationPath CrimsonTune-${{ github.ref_name }}-win64.zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          generate_release_notes: false
          files: |
            CrimsonTune-${{ github.ref_name }}-win64.zip
            RELEASE_NOTES.md
